name: 24/7 Kela Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *' # Bot ko har 3 ghante me automatic active rakhne ke liye
  workflow_dispatch: # Manual start karne ke liye button

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot==21.1.1 pytz

    - name: Run Kela Bot
      run: python main.py
      
